services:
  # ============ API — Fastify + postgres.js + pg-boss ============
  - type: web
    name: priceobo-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    # npm -g pnpm (not `corepack enable`): on Render's newer Node images
    # `/usr/bin` is read-only and corepack enable crashes with EROFS.
    # --prod=false: NODE_ENV=production makes pnpm skip devDependencies
    # (typescript, @types/*); the build needs them, so force-install dev deps.
    buildCommand: npm install -g pnpm@9.12.0 && pnpm install --frozen-lockfile --prod=false && pnpm --filter @fbm/shared run build && pnpm --filter @fbm/api run build
    preDeployCommand: pnpm --filter @fbm/api run db:migrate
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: COOKIE_SECURE
        value: "true"
      # web and API are separate onrender.com subdomains (cross-site)
      - key: COOKIE_SAMESITE
        value: "none"
      # Neon pooled connection string — include ?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      # Comma-separated allowed web origins (set to the static site URL)
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Optional: SMTP_*, R2_*, SPAPI_* — see apps/api/.env.example
      - key: SPAPI_REFRESH_TOKEN
        sync: false
      - key: SPAPI_LWA_APP_ID
        sync: false
      - key: SPAPI_LWA_CLIENT_SECRET
        sync: false
      - key: SPAPI_SELLER_ID
        sync: false
      - key: SPAPI_MARKETPLACE_ID
        sync: false

  # ============ Web — React + Vite (static) ============
  - type: web
    name: priceobo-web
    runtime: static
    rootDir: .
    buildCommand: npm install -g pnpm@9.12.0 && pnpm install --frozen-lockfile --prod=false && pnpm --filter @fbm/shared run build && pnpm --filter @fbm/web run build
    staticPublishPath: apps/web/dist
    envVars:
      # Set to the API URL once priceobo-api is deployed
      - key: VITE_API_URL
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
